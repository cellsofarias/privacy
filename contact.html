<!doctype html>
<html lang="pt-BR">

<head>

    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Contato | Cellso</title>

    <meta
        name="description"
        content="Entre em contato com a Cellso para suporte técnico, dúvidas sobre assinaturas, privacidade e funcionamento do aplicativo Minha Empresa."
    >

    <link
        rel="canonical"
        href="https://cellso.com.br/contato"
    >

    <meta
        name="theme-color"
        content="#070707"
    >

    <!-- Favicons -->
    <link
        rel="icon"
        type="image/png"
        sizes="32x32"
        href="/ativos/logo_c_amarela.png"
    >

    <link
        rel="icon"
        type="image/png"
        sizes="16x16"
        href="/ativos/logo_c_amarela.png"
    >

    <link
        rel="shortcut icon"
        href="/ativos/logo_c_amarela.png"
    >

    <link
        rel="apple-touch-icon"
        href="/ativos/logo_c_amarela.png"
    >

    <!-- Open Graph -->
    <meta
        property="og:type"
        content="website"
    >

    <meta
        property="og:title"
        content="Contato | Cellso"
    >

    <meta
        property="og:description"
        content="Suporte oficial da Cellso para o aplicativo Minha Empresa."
    >

    <meta
        property="og:url"
        content="https://cellso.com.br/contato"
    >

    <meta
        property="og:image"
        content="https://cellso.com.br/ativos/logo_c_amarela.png"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="/estilos.css"
    >

</head>

<body>

<header>

    <div class="container nav">

        <a
            class="brand"
            href="/"
            aria-label="Página inicial"
        >

            <img
                src="/ativos/logo_c_amarela.png"
                alt="Logo da Cellso"
            >

        </a>

    </div>

</header>

<main class="container legal">

    <div class="eyebrow">
        Suporte
    </div>

    <h1>
        Entre em contato
    </h1>

    <p>
        Para suporte técnico, dúvidas sobre assinatura, privacidade
        ou funcionamento do aplicativo Minha Empresa.
    </p>

    <div class="card">

        <h3>
            E-mail
        </h3>

        <p>

            <a href="mailto:suporte@cellso.com.br">
                <strong>suporte@cellso.com.br</strong>
            </a>

        </p>

    </div>

</main>

<footer>

    <div class="container footer-inner">

        <span>
            © 2026 Developed by Cellso
        </span>

        <a href="/">
            Início
        </a>

    </div>

</footer>

</body>
</html>
